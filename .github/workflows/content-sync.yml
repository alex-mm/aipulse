name: Content Sync to Supabase

on:
  push:
    branches: [main]
    paths: ['content/**']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync content to Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cat > /tmp/sync.cjs << 'NODEJS'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SERVICE_KEY = process.env.SUPABASE_SERVICE_KEY;

          if (!SUPABASE_URL || !SERVICE_KEY) {
            console.error('Missing SUPABASE_URL or SUPABASE_SERVICE_KEY');
            process.exit(1);
          }

          function sbRequest(method, table, opts = {}) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(SUPABASE_URL + '/rest/v1/' + table + (opts.query ? '?' + opts.query : ''));
              const body = opts.body ? JSON.stringify(opts.body) : null;
              const headers = {
                'apikey': SERVICE_KEY,
                'Authorization': 'Bearer ' + SERVICE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation',
              };
              if (body) headers['Content-Length'] = Buffer.byteLength(body);
              const req = https.request({
                hostname: urlObj.hostname,
                path: urlObj.pathname + urlObj.search,
                method,
                headers
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode >= 400) { reject(new Error('SB ' + res.statusCode + ': ' + data)); return; }
                  try { resolve(data ? JSON.parse(data) : null); } catch { resolve(data); }
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          function parseFrontmatter(raw) {
            const match = raw.match(/^---\n([\s\S]*?)\n---\n?/);
            if (!match) return { meta: {}, body: raw };
            const meta = {};
            for (const line of match[1].split('\n')) {
              const m = line.match(/^(\w+):\s*(.+)$/);
              if (!m) continue;
              const [, key, val] = m;
              if (val.trim().startsWith('[')) {
                meta[key] = val.trim().slice(1, -1).split(',').map(s => s.trim().replace(/['"]/g, ''));
              } else {
                meta[key] = val.replace(/^['"]|['"]$/g, '').trim();
              }
            }
            const body = raw.slice(match[0].length);
            return { meta, body };
          }

          function extractSummary(body) {
            const lines = body.split('\n').filter(l => l.trim() && !l.startsWith('#') && !l.startsWith('>'));
            const firstPara = lines.slice(0, 3).join(' ')
              .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
              .replace(/\*\*/g, '').trim();
            return firstPara.slice(0, 200);
          }

          async function upsertEdition(date) {
            const existing = await sbRequest('GET', 'editions', { query: 'date=eq.' + date + '&limit=1' });
            if (existing && existing.length > 0) {
              console.log('  Edition exists id=' + existing[0].id);
              return existing[0];
            }
            const d = new Date(date);
            const startOfYear = new Date(d.getFullYear(), 0, 1);
            const weekNum = Math.ceil(((d - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
            const edNum = weekNum * 10 + d.getDay();
            const edition = await sbRequest('POST', 'editions', { body: { date, number: edNum, status: 'draft' } });
            const ed = Array.isArray(edition) ? edition[0] : edition;
            console.log('  Created edition id=' + ed.id + ' date=' + date);
            return ed;
          }

          async function resolveSourceArticleId(editionId, region, sourceSlug) {
            // sourceSlug 对应 brief 文章的 source_name 字段，或者直接用 region 匹配
            // 先按 edition_id + region + tier=brief 查
            const briefs = await sbRequest('GET', 'articles', {
              query: 'edition_id=eq.' + editionId + '&region=eq.' + region + '&tier=eq.brief&limit=1'
            });
            if (briefs && briefs.length > 0) return briefs[0].id;
            return null;
          }

          async function upsertArticle(editionId, region, tier, title, summary, body, tags, date, slug, sourceSlug) {
            // brief 用 (edition_id + region + tier) 作唯一键
            // 其他 tier（deep/analysis/category/item）用 (edition_id + region + tier + slug) 作唯一键，支持同 region 多篇
            let query = 'edition_id=eq.' + editionId + '&region=eq.' + region + '&tier=eq.' + tier;
            if (tier !== 'brief' && slug) query += '&source_name=eq.' + encodeURIComponent(slug);
            query += '&limit=1';

            const existing = await sbRequest('GET', 'articles', { query });
            let articleId;

            // 如果是 analysis，解析 source_article_id
            let sourceArticleId = null;
            if (tier === 'analysis') {
              sourceArticleId = await resolveSourceArticleId(editionId, region, sourceSlug || slug);
              if (sourceArticleId) console.log('  Linked to brief id=' + sourceArticleId);
            }

            const patchBody = { title, summary, content: body, published_at: new Date(date + 'T00:00:00Z').toISOString() };
            if (sourceArticleId) patchBody.source_article_id = sourceArticleId;

            if (existing && existing.length > 0) {
              articleId = existing[0].id;
              await sbRequest('PATCH', 'articles', { query: 'id=eq.' + articleId, body: patchBody });
              console.log('  Updated article id=' + articleId);
            } else {
              const createBody = {
                edition_id: editionId, region, tier, title, summary, content: body,
                source_url: '', source_name: slug || '', published_at: new Date(date + 'T00:00:00Z').toISOString()
              };
              if (sourceArticleId) createBody.source_article_id = sourceArticleId;
              const created = await sbRequest('POST', 'articles', { body: createBody });
              const art = Array.isArray(created) ? created[0] : created;
              articleId = art.id;
              console.log('  Created article id=' + articleId);
            }
            if (tags && tags.length > 0) {
              await sbRequest('DELETE', 'article_tags', { query: 'article_id=eq.' + articleId });
              await sbRequest('POST', 'article_tags', { body: tags.map(t => ({ article_id: articleId, tag: t })) });
              console.log('  Tags: ' + tags.join(', '));
            }
            await sbRequest('PATCH', 'editions', { query: 'id=eq.' + editionId, body: { status: 'published' } });
            return articleId;
          }

          // Full scan: always process ALL content files to ensure consistency
          let changedFiles;
          try {
            const out = execSync('find content -name "*.md" -not -path "content/sample/*"', { encoding: 'utf8' });
            changedFiles = out.trim().split('\n').filter(f => f && f.endsWith('.md'));
          } catch {
            changedFiles = [];
          }
          if (!changedFiles || changedFiles[0] === '') changedFiles = [];

          async function main() {
            console.log('Files to sync: ' + changedFiles.length);

            let ok = 0, fail = 0;
            const syncedKeys = new Set(); // track edition_id:source_name:tier
            const syncedEditions = new Set();
            for (const file of changedFiles) {
              if (!fs.existsSync(file)) { console.log('Skip (not found): ' + file); continue; }
              console.log('Processing: ' + file);
              try {
                const raw = fs.readFileSync(file, 'utf8');
                const { meta, body } = parseFrontmatter(raw);

                const basename = path.basename(file, '.md');
                // region/tier 优先从 frontmatter 读取
                const parts = basename.split('-');
                const region = meta.region || parts[0];
                const tier = meta.tier || parts[1];
                // slug 直接用文件名（不含扩展名），保证每篇文章唯一
                const slug = meta.slug || basename;
                const sourceSlug = meta.source_slug || slug;

                // 从路径中找日期目录（支持新结构 content/2026-04-19/overseas/briefing/xxx.md）
                const pathParts = file.split(path.sep);
                const datePart = pathParts.find(p => /^\d{4}-\d{2}-\d{2}$/.test(p));
                const date = meta.date || datePart || new Date().toISOString().slice(0, 10);

                if (!['overseas', 'domestic'].includes(region)) { console.log('  Skip unknown region: ' + region); continue; }
                if (!['brief', 'deep', 'analysis', 'category', 'item'].includes(tier)) { console.log('  Skip unknown tier: ' + tier); continue; }

                const title = meta.title || (body.match(/^# (.+)$/m) || [])[1] || basename;
                const summary = extractSummary(body);
                const tags = meta.tags || [];

                const edition = await upsertEdition(date);
                const artId = await upsertArticle(edition.id, region, tier, title, summary, body, tags, date, slug, sourceSlug);
                syncedEditions.add(edition.id);
                syncedKeys.add(edition.id + ':' + (slug || '') + ':' + tier);
                console.log('  OK: ' + region + '/' + tier + (slug ? '/' + slug : '') + ' ' + date);
                ok++;
              } catch (err) {
                console.error('  ERROR: ' + err.message);
                fail++;
              }
            }

            console.log('Sync done: ' + ok + ' ok, ' + fail + ' failed');

            // Cleanup: remove articles not matching any content file
            // Collect all valid (edition_id, source_name, tier) tuples from synced files
            if (syncedKeys.size > 0) {
              for (const edId of syncedEditions) {
                const allArticles = await sbRequest('GET', 'articles', {
                  query: 'edition_id=eq.' + edId + '&tier=neq.brief&select=id,source_name,tier'
                });
                if (!allArticles) continue;
                for (const art of allArticles) {
                  const key = edId + ':' + (art.source_name || '') + ':' + art.tier;
                  if (!syncedKeys.has(key)) {
                    try {
                      await sbRequest('DELETE', 'article_tags', { query: 'article_id=eq.' + art.id });
                      await sbRequest('DELETE', 'articles', { query: 'id=eq.' + art.id });
                      console.log('  Cleaned orphan: ' + art.tier + '/' + (art.source_name||'no-slug') + ' id=' + art.id);
                    } catch (e) { console.log('  Cleanup error: ' + e.message); }
                  }
                }
              }
            }

            if (fail > 0) process.exit(1);
          }

          main().catch(err => { console.error('Fatal:', err.message); process.exit(1); });
          NODEJS
          node /tmp/sync.cjs
